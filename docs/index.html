<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Reports</title>
    <style>
      :root {
        --color-bg-base: #0d1117;
        --color-bg-surface: #161b22;
        --color-bg-elevated: #1c2128;
        --color-bg-hover: #21262d;

        --color-border-subtle: #30363d;
        --color-border-muted: #21262d;

        --color-text-primary: #e6edf3;
        --color-text-secondary: #8b949e;
        --color-text-tertiary: #6e7681;

        --color-accent: #58a6ff;
        --color-bull: #26a69a;
        --color-bear: #ef5350;
        --color-warning: #d29922;

        --font-display:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-body:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;

        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 48px;

        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background: var(--color-bg-base);
        color: var(--color-text-primary);
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: var(--space-6) var(--space-5);
      }

      /* === Header === */
      header {
        border-bottom: 1px solid var(--color-border-subtle);
        padding-bottom: var(--space-5);
        margin-bottom: var(--space-6);
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        flex-wrap: wrap;
        gap: var(--space-4);
      }

      .header-left {
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }

      .site-title {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .site-subtitle {
        font-size: 13px;
        color: var(--color-text-tertiary);
        font-family: var(--font-mono);
      }

      .header-meta {
        display: flex;
        gap: var(--space-4);
        align-items: center;
        font-size: 12px;
        color: var(--color-text-tertiary);
        font-family: var(--font-mono);
      }

      .stats {
        display: flex;
        gap: var(--space-4);
      }

      .stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-text-tertiary);
      }

      .stat-value {
        font-family: var(--font-mono);
        font-size: 18px;
        font-weight: 600;
        color: var(--color-text-primary);
      }

      /* === Controls === */
      .controls {
        display: flex;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
        flex-wrap: wrap;
      }

      .search-input {
        flex: 1;
        min-width: 240px;
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-sm);
        padding: var(--space-2) var(--space-3);
        color: var(--color-text-primary);
        font-family: var(--font-body);
        font-size: 13px;
        transition: border-color 0.15s ease;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--color-accent);
      }

      .search-input::placeholder {
        color: var(--color-text-tertiary);
      }

      .sort-select {
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-sm);
        padding: var(--space-2) var(--space-3);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 12px;
        cursor: pointer;
      }

      .sort-select:focus {
        outline: none;
        border-color: var(--color-accent);
      }

      /* === Table === */
      .reports-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-md);
        overflow: hidden;
      }

      .reports-table th {
        text-align: left;
        padding: var(--space-3) var(--space-4);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-text-tertiary);
        background: var(--color-bg-elevated);
        border-bottom: 1px solid var(--color-border-subtle);
        user-select: none;
      }

      .reports-table th.sortable {
        cursor: pointer;
      }

      .reports-table th.sortable:hover {
        color: var(--color-text-primary);
      }

      .reports-table th.sortable::after {
        content: "↕";
        margin-left: var(--space-1);
        opacity: 0.4;
        font-family: var(--font-mono);
      }

      .reports-table th.sortable.sort-asc::after {
        content: "↑";
        opacity: 1;
        color: var(--color-accent);
      }

      .reports-table th.sortable.sort-desc::after {
        content: "↓";
        opacity: 1;
        color: var(--color-accent);
      }

      .reports-table td {
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--color-border-muted);
        font-size: 13px;
      }

      .reports-table tr:last-child td {
        border-bottom: none;
      }

      .reports-table tbody tr {
        transition: background-color 0.1s ease;
        cursor: pointer;
      }

      .reports-table tbody tr:hover {
        background: var(--color-bg-hover);
      }

      .symbol-cell {
        font-family: var(--font-mono);
        font-weight: 600;
        color: var(--color-accent);
      }

      .date-cell {
        font-family: var(--font-mono);
        color: var(--color-text-secondary);
      }

      .filename-cell {
        font-family: var(--font-mono);
        color: var(--color-text-tertiary);
        font-size: 12px;
      }

      .report-link {
        color: var(--color-accent);
        text-decoration: none;
      }

      .report-link:hover {
        text-decoration: underline;
      }

      /* === State indicators === */
      .state-message {
        text-align: center;
        padding: var(--space-7) var(--space-4);
        color: var(--color-text-tertiary);
        font-size: 14px;
      }

      .state-message.error {
        color: var(--color-bear);
        background: rgba(239, 83, 80, 0.05);
        border: 1px solid rgba(239, 83, 80, 0.2);
        border-radius: var(--radius-md);
        margin-top: var(--space-4);
      }

      .state-message.empty {
        background: var(--color-bg-surface);
        border: 1px dashed var(--color-border-subtle);
        border-radius: var(--radius-md);
        margin-top: var(--space-4);
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid var(--color-border-subtle);
        border-top-color: var(--color-accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: var(--space-2);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* === Footer === */
      footer {
        margin-top: var(--space-7);
        padding-top: var(--space-4);
        border-top: 1px solid var(--color-border-subtle);
        color: var(--color-text-tertiary);
        font-size: 11px;
        font-family: var(--font-mono);
        text-align: center;
      }

      footer a {
        color: var(--color-text-tertiary);
        text-decoration: none;
      }

      footer a:hover {
        color: var(--color-accent);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="header-left">
          <h1 class="site-title">Finance Reports</h1>
          <div class="site-subtitle">個人投資メモ・市場分析アーカイブ</div>
        </div>
        <div class="stats">
          <div class="stat">
            <span class="stat-label">Total Reports</span>
            <span class="stat-value" id="total-count">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Latest</span>
            <span class="stat-value" id="latest-date">—</span>
          </div>
        </div>
      </header>

      <div class="controls">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="銘柄シンボルで絞り込み（例: AAPL, USDJPY）"
        />
        <select id="sort-select" class="sort-select">
          <option value="date-desc">新しい順</option>
          <option value="date-asc">古い順</option>
          <option value="symbol-asc">Symbol A-Z</option>
          <option value="symbol-desc">Symbol Z-A</option>
        </select>
      </div>

      <div id="content-area">
        <div class="state-message">
          <span class="loading-spinner"></span>レポート一覧を読み込み中…
        </div>
      </div>

      <footer>
        <a
          href="https://github.com/"
          id="repo-link"
          target="_blank"
          rel="noopener"
          >View on GitHub</a
        >
      </footer>
    </div>

    <script>
      (function () {
        "use strict";

        // === Configuration ===
        // GitHub Pages の publication URL から owner/repo を自動推定する
        // 例: https://username.github.io/finance-reports/  →  owner=username, repo=finance-reports
        function detectRepoFromLocation() {
          const host = window.location.hostname;
          const pathname = window.location.pathname;

          // username.github.io/repo-name/ パターン
          const hostMatch = host.match(/^([^.]+)\.github\.io$/);
          if (hostMatch) {
            const owner = hostMatch[1];
            const pathParts = pathname.split("/").filter(Boolean);
            const repo = pathParts[0] || "";
            return { owner, repo };
          }

          // ローカル確認用フォールバック
          return { owner: "YOUR_USERNAME", repo: "finance-reports" };
        }

        const { owner, repo } = detectRepoFromLocation();
        const API_URL = `https://api.github.com/repos/${owner}/${repo}/contents/docs/reports`;
        const REPO_URL = `https://github.com/${owner}/${repo}`;

        document.getElementById("repo-link").href = REPO_URL;

        // === State ===
        let allReports = [];
        let filteredReports = [];
        let currentSort = "date-desc";

        // === DOM refs ===
        const contentArea = document.getElementById("content-area");
        const searchInput = document.getElementById("search-input");
        const sortSelect = document.getElementById("sort-select");
        const totalCountEl = document.getElementById("total-count");
        const latestDateEl = document.getElementById("latest-date");

        // === Parse filename ===
        // ファイル名: {SYMBOL}_{YYYYMMDD}.html
        function parseFilename(filename) {
          const match = filename.match(/^(.+)_(\d{4})(\d{2})(\d{2})\.html$/);
          if (!match) return null;
          return {
            filename,
            symbol: match[1],
            dateRaw: match[2] + match[3] + match[4],
            dateFormatted: `${match[2]}-${match[3]}-${match[4]}`,
          };
        }

        // === Fetch reports ===
        async function fetchReports() {
          try {
            const res = await fetch(API_URL, {
              headers: { Accept: "application/vnd.github+json" },
            });

            if (res.status === 404) {
              renderError(
                "リポジトリまたは reports/ ディレクトリが見つかりません。",
                `Checked: ${API_URL}`,
              );
              return;
            }

            if (res.status === 403) {
              renderError(
                "GitHub APIのレート制限に達しました。",
                "1時間ほど時間を置いて再度お試しください（未認証で60リクエスト/時の制限があります）。",
              );
              return;
            }

            if (!res.ok) {
              renderError(
                `APIリクエストに失敗しました (HTTP ${res.status})`,
                res.statusText,
              );
              return;
            }

            const data = await res.json();
            const reports = data
              .filter(
                (item) => item.type === "file" && item.name.endsWith(".html"),
              )
              .map((item) => {
                const parsed = parseFilename(item.name);
                if (!parsed) return null;
                return { ...parsed, url: `reports/${item.name}` };
              })
              .filter(Boolean);

            allReports = reports;
            updateStats();
            applyFiltersAndSort();
          } catch (err) {
            renderError("レポート一覧の取得に失敗しました。", err.message);
          }
        }

        // === Stats ===
        function updateStats() {
          totalCountEl.textContent = allReports.length;
          if (allReports.length > 0) {
            const sorted = [...allReports].sort((a, b) =>
              b.dateRaw.localeCompare(a.dateRaw),
            );
            latestDateEl.textContent = sorted[0].dateFormatted;
          } else {
            latestDateEl.textContent = "—";
          }
        }

        // === Filter & Sort ===
        function applyFiltersAndSort() {
          const query = searchInput.value.trim().toUpperCase();
          filteredReports = allReports.filter(
            (r) => !query || r.symbol.toUpperCase().includes(query),
          );

          switch (currentSort) {
            case "date-desc":
              filteredReports.sort((a, b) =>
                b.dateRaw.localeCompare(a.dateRaw),
              );
              break;
            case "date-asc":
              filteredReports.sort((a, b) =>
                a.dateRaw.localeCompare(b.dateRaw),
              );
              break;
            case "symbol-asc":
              filteredReports.sort((a, b) => a.symbol.localeCompare(b.symbol));
              break;
            case "symbol-desc":
              filteredReports.sort((a, b) => b.symbol.localeCompare(a.symbol));
              break;
          }

          renderTable();
        }

        // === Render ===
        function renderTable() {
          if (filteredReports.length === 0) {
            const msg =
              allReports.length === 0
                ? "まだレポートがありません。最初のレポートを作成しましょう。"
                : "該当するレポートが見つかりません。";
            contentArea.innerHTML = `<div class="state-message empty">${msg}</div>`;
            return;
          }

          const rows = filteredReports
            .map(
              (r) => `
      <tr data-url="${r.url}">
        <td class="symbol-cell">${r.symbol}</td>
        <td class="date-cell">${r.dateFormatted}</td>
        <td class="filename-cell">${r.filename}</td>
      </tr>
    `,
            )
            .join("");

          contentArea.innerHTML = `
      <table class="reports-table">
        <thead>
          <tr>
            <th class="sortable" data-sort="symbol">Symbol</th>
            <th class="sortable" data-sort="date">Date</th>
            <th>Filename</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

          // Row click → open report
          contentArea.querySelectorAll("tbody tr").forEach((tr) => {
            tr.addEventListener("click", (e) => {
              if (e.target.tagName === "A") return;
              window.location.href = tr.dataset.url;
            });
          });

          // Column header sort
          contentArea.querySelectorAll("th.sortable").forEach((th) => {
            th.addEventListener("click", () => {
              const key = th.dataset.sort;
              const isAsc = currentSort === `${key}-asc`;
              currentSort = `${key}-${isAsc ? "desc" : "asc"}`;
              sortSelect.value = currentSort;
              applyFiltersAndSort();
            });
          });
        }

        function renderError(title, detail) {
          contentArea.innerHTML = `
      <div class="state-message error">
        <div style="font-weight: 600; margin-bottom: 4px;">${title}</div>
        ${detail ? `<div style="font-size: 12px; opacity: 0.8; font-family: var(--font-mono);">${detail}</div>` : ""}
      </div>
    `;
        }

        // === Event bindings ===
        searchInput.addEventListener("input", applyFiltersAndSort);
        sortSelect.addEventListener("change", (e) => {
          currentSort = e.target.value;
          applyFiltersAndSort();
        });

        // === Init ===
        fetchReports();
      })();
    </script>
  </body>
</html>
